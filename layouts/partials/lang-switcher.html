{{ if and .Params.multilang .Translations }}
<div class="lang-switcher">
  {{ range sort .AllTranslations "Language.LanguageName" }}
    <a href="{{ .Permalink }}" hreflang="{{ .Language.Lang }}"
      {{- if eq .Language.Lang $.Language.Lang }} class="current"{{ end }}>
      {{- with .Language.Params.flag }}{{ . }}{{ else }}{{ $.Language.Lang }}{{ end }} {{ .Language.LanguageName -}}
    </a>
  {{ end }}
</div>
{{ end }}
